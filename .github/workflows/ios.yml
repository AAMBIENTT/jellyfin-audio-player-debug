name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Build iOS
        run: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)
          echo "Using workspace: $WORKSPACE"

          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | awk '/Schemes:/{getline; print $1}')

          echo "Using scheme: $SCHEME"

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO
      - name: Export IPA
        run: |
          cd ios

          mkdir -p export

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath export \
            -exportOptionsPlist ../exportOptions.plist
